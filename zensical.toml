[project]
site_name = "The MERC Project"
site_url = "https://MERCorg.github.io/merc-website/"
repo_url = "https://github.com/MERCorg/merc/"
repo_name = "MERCorg/merc"

extra_css = ["stylesheets/extra.css"]

nav = [
  { Home = "index.md" },
  { Tools = [
    "tools/merc-sym.md",
  ] },
  { Development = [
    "developer/general.md",
    "developer/testing.md",
    "developer/documentation.md",
    "developer/aterms.md",
  ] },
  { Maintainers = [
    "maintainers/publishing.md",
  ] },
  { Links = [
    { "Issue Tracker" = "https://github.com/MERCorg/merc/issues" },
    { Documentation = "https://MERCorg.github.io/merc/" },
    { Coverage = "https://MERCorg.github.io/merc/coverage/" },
  ] },
]

[project.theme]
language = "en"
features = [
  "navigation.instant",
]

[[project.theme.palette]]
scheme = "slate"
primary = "amber"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "amber"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.highlight]
use_pygments = true
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.latex_math]
